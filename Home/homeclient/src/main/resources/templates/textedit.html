<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org" lang="de">

	<head th:replace="~{basics :: head (name='Home - Notizen', withHomeCSS='false')}"><title></title></head>

	<style>

				body{
					background-color:#000
				}

                #textedit-wrapper {
                    --te-toolbar-height: 56px;
                    --te-bg-color: #111111;
                    --te-text-color: #ffffff;
                    --te-toolbar-bg: #222222;
                    --te-border-color: #444444;
                    --te-textsize-edit: 13px;
                    --te-textsize-view: 0.8rem;

                    position: fixed !important;
                    top: 0;
                    left: 0;
                    width: 100vw;
                    height: 100dvh;
                    z-index: 2000;
                    background-color: var(--te-bg-color) !important;
                    color: var(--te-text-color) !important;
                    overflow: hidden;
                    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                }

                #textedit-wrapper .textedit-toolbar {
                    height: var(--te-toolbar-height);
                    position: absolute;
                    top: 0;
                    left: 0;
                    right: 0;
                    display: flex;
                    align-items: center;
                    padding: 0 1rem;
                    background-color: var(--te-toolbar-bg) !important;
                    border-bottom: 1px solid var(--te-border-color) !important;
                    z-index: 10;
                }

                #textedit-wrapper .textedit-main-container {
                    margin-top: var(--te-toolbar-height);
                    height: calc(100% - var(--te-toolbar-height) - env(safe-area-inset-top));
                    width: 100%;
                    position: relative;
                }

                .textedit-hidden { display: none !important; }

                #textedit-wrapper #textedit-input-area {
                    width: 100%;
                    height: 100%;
                    resize: none;
                    border: none;
                    outline: none;
                    padding: 0.5rem;
                    font-family: 'SFMono-Regular', Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
                    font-size: var(--te-textsize-edit);
                    background-color: transparent !important;
                    color: inherit;
                    caret-color: #ffffff;
                }

                #textedit-wrapper #textedit-output-view {
                    width: 100%;
                    height: 100%;
                    overflow-y: auto;
                    padding: 0.5rem;
                    background-color: transparent !important;
                    color: inherit;
                    font-size: var(--te-textsize-view);
                }

                #textedit-output-view h1,
				#textedit-output-view h2,
				#textedit-output-view h3,
				#textedit-output-view h4,
				#textedit-output-view h5,
				#textedit-output-view h6 {
					font-size: revert-layer;
				}

                #textedit-wrapper #textedit-output-view img { max-width: 100%; height: auto; }

                #textedit-wrapper *::-webkit-scrollbar { width: 8px; }
                #textedit-wrapper *::-webkit-scrollbar-track { background: var(--te-bg-color); }
                #textedit-wrapper *::-webkit-scrollbar-thumb { background: var(--te-border-color); border-radius: 4px; }
                #textedit-wrapper *::-webkit-scrollbar-thumb:hover { background: #666666; }

                #textedit-wrapper h5 {
                	font-size: 1rem;
                }

                #textedit-wrapper h5,
                #textedit-wrapper label,
                #textedit-wrapper .form-check-label {
                    color: #ffffff !important;
                }

				#textedit-visibility-toggle {
					font-size: 1.5rem;
					cursor: pointer;
					margin-top: 0;
					margin-left: 0;
					float: none;
					background-color: rgb(92,184,92);
					border-color: rgb(92,184,92);
				}

				#textedit-visibility-toggle:checked {
					background-color: rgb(240,173,78);
					border-color: rgb(240,173,78);
				}

				.form-check.form-switch {
					display: flex;
					align-items: center;
					gap: 0.5rem;
					padding-left: 0;
				}

				.icon-multi {
					display: none;
				}

				.icon-single {
					color: rgb(92,184,92);
				}

				#textedit-visibility-toggle:checked + label .icon-single {
					display: none;
					color: rgb(92,184,92);
				}

				#textedit-visibility-toggle:checked + label .icon-multi {
					display: inline-block;
					color: rgb(240,173,78);
				}

				#textedit-visibility-toggle,
				#textedit-visibility-toggle:checked {
					background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3c/svg%3e");
				}

				.form-check-label i {
					font-size: 1.25rem;
					width: 25px;
					text-align: center;
				}

				.icon-home {
					font-size: 1.2rem;
					cursor: pointer;
					margin-top: 0;
					margin-left: 0;
					margin-right: 10px;
					float: none;
				}

                #textedit-wrapper a { color: #6ea8fe !important; }

#textedit-table-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 3000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.textedit-modal-content {
    background: var(--te-bg-color, #111);
    border: 1px solid var(--te-border-color, #444);
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 500px;
    color: #fff;
}

.textedit-modal-content h4 { margin-top: 0; margin-bottom: 1rem; }
.textedit-modal-field { margin-bottom: 1rem; }
.textedit-modal-field label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
.textedit-modal-field input {
    width: 100%;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 8px;
    border-radius: 4px;
}
.textedit-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem; }

#textedit-output-view table {
    width: 100%;
    max-width: 100%;
    margin-bottom: 1rem;
    background-color: transparent;
    border-collapse: collapse;
    color: #e0e0e0;
}

#textedit-output-view th,
#textedit-output-view td {
    padding: 0.75rem;
    vertical-align: top;
    border-bottom: 1px solid #333;
    text-align: left;
}

#textedit-output-view thead th {
    vertical-align: bottom;
    border-bottom: 2px solid #555;
    background-color: #1a1a1a;
    color: #fff;
    font-weight: 600;
}

#textedit-output-view tbody tr:hover {
    background-color: rgba(255, 255, 255, 0.05);
}

#textedit-output-view {
    overflow-x: auto;
}

#textedit-messagebox-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
}

#textedit-messagebox-icon {
    font-size: 1.5rem;
    color: #f0ad4e;
}

#textedit-messagebox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease-in-out;
}

#textedit-messagebox-overlay.textedit-messagebox-visible {
    opacity: 1;
    pointer-events: auto;
}

#textedit-messagebox-box {
    background-color: var(--te-bg-color, #111);
    border: 1px solid var(--te-border-color, #444);
    border-radius: 8px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    transform: scale(0.9);
    transition: transform 0.2s ease-in-out;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

#textedit-messagebox-overlay.textedit-messagebox-visible #textedit-messagebox-box {
    transform: scale(1);
}

#textedit-messagebox-title {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: #fff;
}

.textedit-messagebox-btn {
    background-color: transparent;
    color: #ccc;
    border: 1px solid #555;
    padding: 8px 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    margin-right: 10px;
}

.textedit-messagebox-btn:hover {
    background-color: #333;
    color: #fff;
    border-color: #777;
}

#textedit-messagebox-message {
    margin: 0;
    font-size: 1rem;
    color: #ccc;
    line-height: 1.5;
}

#textedit-messagebox-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}

#textedit-messagebox-btn {
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 8px 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background-color 0.2s;
}

#textedit-messagebox-btn:hover,
#textedit-messagebox-btn:focus {
    background-color: #555;
    outline: none;
    border-color: #777;
}

table th[align="right"],
table td[align="right"] {
	text-align: right !important;;
}

table th[align="center"],
table td[align="center"] {
	text-align: center !important;;
}

	</style>

	<body>
		<div th:replace="~{basics :: navigation (selected=${MENU_SELECTED}, selectable=${MENU_SELECTABLE}, status=${SITE_REQUEST_TS}, isApp='true')}"></div>
		<input type="hidden" id="textedit-id" th:value="${id}" />
		<input type="hidden" id="textedit-version" th:value="${version}" />
		<input type="hidden" id="textedit-owner" th:value="${owner}" />
		<input type="hidden" id="textedit-logged-in-user" th:value="${USER_NAME}" />
		<input type="hidden" id="textedit-is-new-notice" th:value="${isNewNotice}" />

		<div id="textedit-wrapper">

			<header class="textedit-toolbar justify-content-between">
				<div class="d-flex align-items-center">
					<i th:if="${#strings.equals(isApp, 'false')}" class="fas fa-home icon-home"></i>
					<h5 id="textedit-header-title-text" class="mb-0 me-4">Notiz</h5>
				</div>

				<div class="d-flex align-items-center gap-3">
					<button type="button" class="btn btn-secondary btn-sm" onclick="backButtonHandle()"><i class="fa-solid fa-circle-chevron-left"></i></button>
					<button type="button" class="btn btn-secondary btn-sm" id="textedit-btn-delete"><i class="fa-solid fa-trash-can"></i></button>
					<button type="button" class="btn btn-secondary btn-sm textedit-hidden" id="textedit-btn-add-row"><i class="fa-solid fa-table"></i></button>
					<button type="button" class="btn btn-secondary btn-sm" id="textedit-btn-toggle"><i id="textedit-btn-toggle-icon" class="fa-solid fa-pen-to-square"></i></button>
					<div class="form-check form-switch m-0 d-flex align-items-center">
						<input style="display: none" class="form-check-input textedit-hidden" type="checkbox" role="switch" id="textedit-visibility-toggle" th:checked="${multiUser}" disabled>
						<label class="form-check-label ms-2 d-flex align-items-center" for="textedit-visibility-toggle">
							<i class="fas fa-user icon-single"></i>
							<i class="fas fa-users icon-multi"></i>
						</label>
					</div>
				</div>
			</header>

			<main class="textedit-main-container">

				<div id="textedit-container-edit" class="h-100 textedit-hidden">
                <textarea id="textedit-input-area" placeholder="Markdown eingeben..." th:text="${text}"></textarea>
				</div>

				<div id="textedit-container-view" class="h-100">
					<div id="textedit-output-view"></div>
				</div>

			</main>
		</div>

		<script type="text/javascript" src="/webjars/marked/lib/marked.umd.js"></script>

		<script>
			const texteditContainerEdit = document.getElementById('textedit-container-edit');
                const texteditContainerView = document.getElementById('textedit-container-view');
                const texteditInputArea = document.getElementById('textedit-input-area');
                const texteditOutputView = document.getElementById('textedit-output-view');
                const texteditBtnToggle = document.getElementById('textedit-btn-toggle');
                const texteditBtnToggleIcon = document.getElementById('textedit-btn-toggle-icon');
                const texteditVisibilityToggle = document.getElementById('textedit-visibility-toggle');
                const texteditBtnAddRow = document.getElementById('textedit-btn-add-row');
                const texteditBtnDelete = document.getElementById('textedit-btn-delete');
                const texteditVersion = document.getElementById('textedit-version');
                const texteditId = document.getElementById('textedit-id');
                const texteditOwner = document.getElementById('textedit-owner');
                const texteditLoggedInUser = document.getElementById('textedit-logged-in-user');
                const texteditIsNewNotice = document.getElementById('textedit-is-new-notice');
                const texteditHeaderTitleText = document.getElementById('textedit-header-title-text');
                let texteditIsEditMode = false;

				function backButtonHandle() {
					if(texteditIsEditMode){
						save('afterSave_Back');
					}else{
						navigateBack();
					}
				}

				function navigateBack() {
					sessionStorage.setItem('navigationFastLinkId', 'notices');
					window.location.href = '/';
				}

                function texteditCheckTables() {
                    const tables = texteditOutputView.querySelectorAll('table');
                    if (tables.length > 0) {
                        texteditBtnAddRow.classList.remove('textedit-hidden');
                    } else {
                        texteditBtnAddRow.classList.add('textedit-hidden');
                    }
                }

                function texteditOpenTableModal() {
                    const tables = texteditOutputView.querySelectorAll('table');
                    if (tables.length === 0) return;

                    const modal = document.createElement('div');
                    modal.id = 'textedit-table-modal';
                    document.body.appendChild(modal);

                    const renderContent = (tableIndex) => {
                        modal.innerHTML = '';

                        const table = tables[tableIndex];
                        const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText.trim());

                        const modalContent = document.createElement('div');
                        modalContent.className = 'textedit-modal-content';
                        modal.appendChild(modalContent);

                        const h4 = document.createElement('h4');
                        h4.textContent = 'Neue Zeile hinzufügen';
                        modalContent.appendChild(h4);

                        let tableSelect = null;
                        if (tables.length > 1) {
                            const selectWrapper = document.createElement('div');
                            selectWrapper.className = 'textedit-modal-field';

                            const selectLabel = document.createElement('label');
                            selectLabel.textContent = 'Tabelle wählen:';
                            selectWrapper.appendChild(selectLabel);

                            tableSelect = document.createElement('select');
                            tableSelect.id = 'textedit-table-select';
                            tableSelect.className = 'form-select text-white bg-dark border-secondary mb-3';

                            tables.forEach((t, i) => {
                                const option = document.createElement('option');
                                option.value = i;
                                const firstHeader = t.querySelector('th') ? t.querySelector('th').innerText : '';
                                option.textContent = firstHeader ? `Tabelle ${i+1} (beginnt mit "${firstHeader}")` : `Tabelle ${i+1}`;
                                if (i == tableIndex) option.selected = true;
                                tableSelect.appendChild(option);
                            });

                            tableSelect.addEventListener('change', (e) => {
                                renderContent(parseInt(e.target.value));
                            });

                            selectWrapper.appendChild(tableSelect);
                            modalContent.appendChild(selectWrapper);
                        }

                        const form = document.createElement('form');
                        form.id = 'textedit-row-form';

                        if (headers.length > 0) {
                            headers.forEach((header) => {
                                const fieldWrapper = document.createElement('div');
                                fieldWrapper.className = 'textedit-modal-field';

                                const label = document.createElement('label');
                                label.textContent = header;
                                fieldWrapper.appendChild(label);

                                const input = document.createElement('input');
                                input.type = 'text';
                                input.required = true;
                                if(header.toLowerCase().includes('datum')){
                                	input.value = new Intl.DateTimeFormat('de-DE', {
  													day: '2-digit',
  													month: '2-digit',
  													year: 'numeric'
												}).format(new Date());
								} else if(header.toLowerCase().includes('user') || header.toLowerCase().includes('wer')){
									input.value = texteditLoggedInUser.value;
								} else if(header.toLowerCase().includes('betrag') || header.includes('€')){
									input.setAttribute('inputmode', 'decimal');
									input.addEventListener('blur', (e) => {
									  let wert = parseFloat(e.target.value.replace(',', '.'));
									  if (isNaN(wert)) return;
									  e.target.value = new Intl.NumberFormat('de-DE', {
										style: 'currency',
										currency: 'EUR'
									  }).format(wert);
									});
                                }else{
                                	input.placeholder = `Wert für ${header}`;
                                }
                                fieldWrapper.appendChild(input);

                                form.appendChild(fieldWrapper);
                            });
                        } else {
                             const p = document.createElement('p');
                             p.className = 'text-warning';
                             p.textContent = 'Diese Tabelle hat keine Kopfzeilen (th).';
                             form.appendChild(p);
                        }

                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'textedit-modal-actions';

                        const cancelBtn = document.createElement('button');
                        cancelBtn.type = 'button';
                        cancelBtn.className = 'btn btn-secondary btn-sm';
                        cancelBtn.textContent = 'Abbrechen';
                        cancelBtn.onclick = () => {
                        	modal.remove();
                        	updateAppLayout();
                        }

                        const submitBtn = document.createElement('button');
                        submitBtn.type = 'submit';
                        submitBtn.className = 'btn btn-success btn-sm';
                        submitBtn.textContent = 'OK';
                        if(headers.length === 0) submitBtn.disabled = true;

                        actionsDiv.appendChild(cancelBtn);
                        actionsDiv.appendChild(submitBtn);
                        form.appendChild(actionsDiv);

                        form.onsubmit = (e) => {
                            e.preventDefault();
                            const inputs = form.querySelectorAll('input[type="text"]');
                            const values = Array.from(inputs).map(input => input.value.trim());
                            const currentTableIndex = tableSelect ? parseInt(tableSelect.value) : tableIndex;
                            texteditAddRowToMarkdown(values, currentTableIndex);
                            modal.remove();
                            updateAppLayout();
                        };

                        modalContent.appendChild(form);

                        const firstInput = form.querySelector('input');
                        if(firstInput) firstInput.focus();
                    };

                    renderContent(0);
                }

                function texteditAddRowToMarkdown(values, tableIndex) {
                    const rawText = texteditInputArea.value;
                    const lines = rawText.split('\n');

                    const newRowMarkdown = '| ' + values.join(' | ') + ' |';
                    const separatorRegex = /^\s*\|?[\s-:]+\|\s*[\s-:|]+\|\s*$/;

                    let foundTablesCount = 0;
                    let separatorLineIndex = -1;
                    let insideCodeBlock = false;

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (line.startsWith('```')) {
                            insideCodeBlock = !insideCodeBlock;
                            continue;
                        }
                        if (!insideCodeBlock && separatorRegex.test(line)) {
                            if (foundTablesCount === tableIndex) {
                                separatorLineIndex = i;
                                break;
                            }
                            foundTablesCount++;
                        }
                    }

                    if (separatorLineIndex === -1) {
                        alert("Fehler: Tabelle im Markdown nicht gefunden.");   // FIXME !!
                        return;
                    }

                    let insertOnTop = false;
                    for (let i = separatorLineIndex - 1; i >= 0; i--) {
                        const prevLine = lines[i].trim();
                        if (prevLine.toLowerCase().includes('oben')) { insertOnTop = true; break; }
                    }

                    let targetLineIndex = separatorLineIndex + 1;
                    if (!insertOnTop) {
                        while (targetLineIndex < lines.length) {
                            const l = lines[targetLineIndex].trim();
                            if ((!l.startsWith('|') && l !== '') || l === '') break;
                            targetLineIndex++;
                        }
                    }

                    lines.splice(targetLineIndex, 0, newRowMarkdown);

                    const newText = lines.join('\n');
                    texteditInputArea.value = newText;
                    save('afterSave_View');
                }

                function texteditRenderViewMode() {
                    const rawText = texteditInputArea.value;
                    texteditHeaderTitleText.innerHTML = 'Notiz anzeigen';
                    texteditOutputView.innerHTML = marked.parse(rawText);

                    texteditCheckTables();

                    texteditContainerEdit.classList.add('textedit-hidden');
                    texteditContainerView.classList.remove('textedit-hidden');
                    texteditIsEditMode = false;

                    texteditBtnToggleIcon.classList = 'fa-solid fa-pen-to-square';
                    texteditVisibilityToggle.classList.add('textedit-hidden');
                    texteditVisibilityToggle.disabled = true;
                }

                function texteditEnableEditMode() {
                    texteditContainerView.classList.add('textedit-hidden');
                    texteditContainerEdit.classList.remove('textedit-hidden');
                    texteditHeaderTitleText.innerHTML = 'Notiz bearbeiten';
                    texteditIsEditMode = true;

                    texteditBtnAddRow.classList.add('textedit-hidden');

                    texteditBtnToggleIcon.classList = 'fa-solid fa-eye';
                    texteditVisibilityToggle.classList.remove('textedit-hidden');
                    texteditVisibilityToggle.disabled = false;

                    setTimeout(() => texteditInputArea.focus(), 50);
                }

                texteditBtnAddRow.addEventListener('click', texteditOpenTableModal);
                texteditVisibilityToggle.addEventListener('change', (event) => {
					const isChecked = event.target.checked;
					if (!isChecked && texteditOwner.value !== texteditLoggedInUser.value) {
						showAlertModal('Geteilte Notiz', 'Achtung! Wenn Du jetzt speicherst, verlierst Du den Zugriff auf diese Notiz.', 'fa-solid fa-triangle-exclamation', false);
					}
				});

                texteditBtnToggle.addEventListener('click', function() {
                    if (texteditIsEditMode) {
                        save('afterSave_View');
                    } else {
                        texteditEnableEditMode();
                    }
                });

                texteditBtnDelete.addEventListener('click', function() {
					showAlertModal('Löschen', 'Soll diese Notiz gelöscht werden?', 'fa-solid fa-trash-can', true, function() {
						alert('LÖSCHEN');
					}, function() {
						alert('CANCEL');
					});
                });

                document.addEventListener('DOMContentLoaded', () => {
                    marked.setOptions({ breaks: true, gfm: true });
                    if(texteditIsNewNotice.value === 'true') {
                    	texteditIsNewNotice.value = 'false';
                    	texteditEnableEditMode();
                    } else {
                    	texteditRenderViewMode();
                    }
                });

				function showAlertModal(titleText, messageText, iconClass, showCancelButton, confirmCallback, cancelCallback) {
					const existingOverlay = document.getElementById('textedit-messagebox-overlay');
					if (existingOverlay) existingOverlay.remove();

					const overlay = document.createElement('div');
					overlay.id = 'textedit-messagebox-overlay';

					const alertBox = document.createElement('div');
					alertBox.id = 'textedit-messagebox-box';
					alertBox.addEventListener('click', (event) => event.stopPropagation());

					const headerContainer = document.createElement('div');
					headerContainer.id = 'textedit-messagebox-header';

					if (iconClass) {
						const iconElement = document.createElement('i');
						iconElement.className = iconClass;
						iconElement.id = 'textedit-messagebox-icon';
						headerContainer.appendChild(iconElement);
					}

					const titleElement = document.createElement('h3');
					titleElement.id = 'textedit-messagebox-title';
					titleElement.textContent = titleText;

					headerContainer.appendChild(titleElement);

					const messageElement = document.createElement('p');
					messageElement.id = 'textedit-messagebox-message';
					messageElement.textContent = messageText;

					const actionsContainer = document.createElement('div');
					actionsContainer.id = 'textedit-messagebox-actions';

					const closeAlert = (callbackToRun) => {
					   overlay.classList.remove('textedit-messagebox-visible');
					   setTimeout(() => {
						  if (overlay.parentNode) overlay.remove();
						  if (typeof callbackToRun === 'function') callbackToRun();
					   }, 200);
					};

					if (showCancelButton) {
						const cancelButton = document.createElement('button');
						cancelButton.id = 'textedit-messagebox-cancel-btn';
						cancelButton.className = 'textedit-messagebox-btn';
						cancelButton.textContent = 'Abbrechen';
						cancelButton.addEventListener('click', () => closeAlert(cancelCallback));
						actionsContainer.appendChild(cancelButton);
					}

					const confirmButton = document.createElement('button');
					confirmButton.id = 'textedit-messagebox-confirm-btn';
					confirmButton.className = 'textedit-messagebox-btn';
					confirmButton.textContent = 'OK';
					confirmButton.addEventListener('click', () => closeAlert(confirmCallback));

					actionsContainer.appendChild(confirmButton);

					overlay.addEventListener('click', () => closeAlert(cancelCallback));

					const handleEscapeKey = (event) => {
					   if (event.key === 'Escape') {
						  closeAlert(cancelCallback);
						  document.removeEventListener('keydown', handleEscapeKey);
					   }
					};
					document.addEventListener('keydown', handleEscapeKey);

					alertBox.appendChild(headerContainer);
					alertBox.appendChild(messageElement);
					alertBox.appendChild(actionsContainer);
					overlay.appendChild(alertBox);

					document.body.appendChild(overlay);

					requestAnimationFrame(() => {
					   overlay.classList.add('textedit-messagebox-visible');
					   confirmButton.focus();
					});
				}

				function save(afterSave){
					if(navigator.onLine){
						let httpRequest = new XMLHttpRequest();
						httpRequest.open('POST', '/texteditSave?id=' + texteditId.value + '&version=' + texteditVersion.value + '&multiUser=' + texteditVisibilityToggle.checked);
						httpRequest.setRequestHeader('Cache-Control', 'no-cache');
						httpRequest.setRequestHeader('CSRF', 'true');
						httpRequest.send(texteditInputArea.value);
						httpRequest.onreadystatechange=(e)=>{
							if (httpRequest.readyState === 4) {
								if(httpRequest.status === 200){
									if(afterSave === 'afterSave_Back') {
										navigateBack();
									}
									if(afterSave === 'afterSave_View') {
										const resp = JSON.parse(httpRequest.responseText);
										texteditInputArea.value = resp.text;
										texteditVersion.value = resp.version;
										texteditRenderViewMode();
									}
								}else{
									showAlertModal('Fehler', 'Speichern nicht erfolgreich!', 'fa-solid fa-triangle-exclamation', false);
								}
							}
						}
					}else{
						showAlertModal('Fehler', 'Bitte Netzwerk prüfen!', 'fa-solid fa-triangle-exclamation', false);
					}
				}

		</script>

		<script>
			function updateAppLayout() {
                const wrapper = document.getElementById('textedit-wrapper');
                if (!wrapper || !window.visualViewport) return;
                const invisibleHeight = Math.max(0, window.innerHeight - window.visualViewport.height);
                if (invisibleHeight > 100) {
                    wrapper.style.height = `calc(100dvh - ${invisibleHeight}px)`;
                    if(!document.getElementById('textedit-table-modal')){
                    	window.scrollTo(0, 0);
                    }
                } else {
                    wrapper.style.height = '100dvh';
                    wrapper.style.top = '0px';
                }
            }

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', updateAppLayout);
                window.visualViewport.addEventListener('scroll', () => {
                     if(window.visualViewport.offsetTop > 0) {
                     	if(!document.getElementById('textedit-table-modal')){
                     		window.scrollTo(0,0);
                     	}
                     }
                });
            } else {
                window.addEventListener('resize', updateAppLayout);
            }

            updateAppLayout();
		</script>

	</body>
